# Phase 7: exchange-agnostic section. When [exchange].name is set, load_config
# populates the legacy market_data / execution / strategy fields below from
# these values. Switch to Binance by setting name = "binance" and editing the
# corresponding URLs / symbol — the legacy fields are still consumed by code
# paths that pre-date Phase 7.
[exchange]
name = "okx"
symbol = "BTC-USDT-SWAP"
ws_base_url = "wss://ws.okx.com:8443/ws/v5/public"
rest_base_url = "https://www.okx.com"
contract_size = 0.01
tick_size = 0.1
qty_step = 1

[market_data]
symbol = "BTCUSDT"
ws_base_url = "wss://fstream.binance.com/ws"
rest_depth_url = "https://fapi.binance.com/fapi/v1/depth"
depth_levels = 20
volatility_window = 100

[transport]
ring_buffer_capacity = 65536
snapshot_ring_capacity = 16384
quote_ring_capacity = 16384
risk_event_ring_capacity = 1024
fill_ring_capacity = 1024
db_ring_capacity = 4096

[reporter]
core = 6
batch_size = 100
flush_interval_ms = 1000
pg_pool_min = 2

[runtime]
ws_cpu_core = 2
processor_cpu_core = 3
strategy_cpu_core = 4
risk_cpu_core = -1
execution_cpu_core = -1

[execution]
rest_base_url = "https://fapi.binance.com"
recv_window_ms = 5000
ack_timeout_ms = 2000
reconcile_interval_seconds = 300
position_divergence_tolerance = 0.001
flatten_threshold = 0.001
http_timeout_ms = 3000

[logging]
level = "info"
file = "logs/spreadara.log"

[reconnect]
initial_backoff_ms = 500
max_backoff_ms = 30000
max_attempts = 5

[strategy]
gamma = 0.1
k = 1.5
horizon = 1.0
min_tick = 0.1
qty_step = 0.001
volatility_floor = 0.0001
baseline_volatility = 0.0002
vol_widen_multiplier = 1.5
depth_threshold = 10.0
inventory_skew_threshold_pct = 30.0
max_inventory = 5.0
max_skew_bps = 25.0
emergency_unwind_pct = 90.0
funding_rate = 0.0
min_requote_ms = 50
price_move_ticks_threshold = 2
quote_lifetime_ms = 5000
quote_qty = 0.01

[backtest]
enabled = false
data_dir = "data/historical"
replay_speed = 100
start_date = "2026-01-01"
end_date = "2026-05-01"
initial_capital = 10000.0
risk_free_rate = 0.05
enable_calibration = false

[testnet]
# OKX testnet (paper trading): the REST endpoint is the prod URL with the
# x-simulated-trading: 1 header (set automatically). WS has a dedicated URL.
enabled = false
ws_base_url = "wss://wspap.okx.com:8443/ws/v5/public?brokerId=9999"
rest_base_url = "https://www.okx.com"

# Phase 8: dashboard progress-bar denominators. The Go backend reads these via
# env vars (SPREADARA_MAX_OPEN_ORDERS, SPREADARA_MAX_INVENTORY_DISPLAY); the
# config-file entries here are operator documentation only.
[dashboard]
max_open_orders = 10
max_inventory_display = 0.1

[risk]
max_position = 0.1
max_order_size = 0.05
price_sanity_pct = 0.5
rate_limit_threshold = 1500
max_daily_loss = 500.0
max_open_orders = 10
max_drawdown_pct = 5.0
max_unhedged_seconds = 30
max_consecutive_rejections = 5
circuit_breaker_poll_ms = 100
